        function makeDots(seasonArr) {
            return MONTH_KEYS.map((m, i) => {
                const color = seasonArr[i] ? hexMap[m] : 'white';
                return `<span class="dot" style="background-color:${color};"></span>`;
            }).join('');
        }

        function render() {
            const id = new URLSearchParams(window.location.search).get('id') || '';
            const recipe = recipeData[id];
            const meta = recipeMeta[id];

            if (!recipe || !meta) {
                document.querySelector('main').innerHTML = '<p class="text-center text-gray-400 py-20">Recipe not found. <a href="recipes.html" class="underline">Back to Kitchen</a></p>';
                lucide.createIcons();
                return;
            }

            document.title = `FORAGER — ${recipe.name}`;

            const peak = meta.peak;
            const isDark = darkMonths.includes(peak);
            const heroColor = hexMap[peak];
            const textColor = isDark ? 'white' : '#1A1C19';

            // Hero
            const hero = document.getElementById('hero');
            hero.style.backgroundColor = heroColor;

            const badge = document.getElementById('type-badge');
            badge.textContent = meta.type;
            badge.style.backgroundColor = typeBadgeColors[meta.type];
            badge.style.color = typeBadgeText[meta.type];

            const nameEl = document.getElementById('recipe-name');
            nameEl.textContent = recipe.name;
            nameEl.style.color = textColor;

            // Plant link
            const plantLink = document.getElementById('plant-link');
            plantLink.textContent = recipe.plant;
            plantLink.href = `plant-detail.html?id=${recipe.plant_id}`;
            plantLink.style.color = '#2D6A4F';
            document.getElementById('plant-danish').textContent = `(${meta.dk})`;

            // Season dots
            document.getElementById('season-dots').innerHTML = makeDots(recipe.season);

            // Intro
            document.getElementById('recipe-intro').textContent = recipe.intro;

            // Time + serves
            document.getElementById('recipe-time').textContent = recipe.time;
            document.getElementById('recipe-serves').textContent = recipe.serves;

            // Alternatives
            if (recipe.plant_alternatives && recipe.plant_alternatives.length > 0) {
                document.getElementById('alts-text').textContent = recipe.plant_alternatives.join(' · ');
                document.getElementById('alts-section').classList.remove('hidden');
            }

            // Ingredients
            const ingList = document.getElementById('ingredients-list');
            recipe.ingredients.forEach(ing => {
                const li = document.createElement('li');
                li.className = 'flex items-start gap-3 text-sm text-gray-700';
                li.innerHTML = `
                    <span class="mt-1.5 w-2 h-2 rounded-full flex-shrink-0" style="background-color:${heroColor}"></span>
                    <span>${ing}</span>
                `;
                ingList.appendChild(li);
            });

            // Method
            const methodEl = document.getElementById('method-steps');
            recipe.method.forEach((step, i) => {
                const div = document.createElement('div');
                div.className = 'flex gap-4';
                div.innerHTML = `
                    <div class="step-number" style="background-color:${heroColor};color:${textColor}">${i + 1}</div>
                    <div class="flex-1 pt-0.5">
                        <p class="text-sm text-gray-700 leading-relaxed">${step}</p>
                    </div>
                `;
                methodEl.appendChild(div);
            });

            // Tip
            if (recipe.tip) {
                document.getElementById('tip-text').textContent = recipe.tip;
                document.getElementById('tip-section').classList.remove('hidden');
            }

            document.getElementById('month-dot').style.backgroundColor = hexMap[MONTH_KEYS[new Date().getMonth()]];
            lucide.createIcons();
        }

        render();
    </script>
