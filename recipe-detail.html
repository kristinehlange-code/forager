                desc: 'A warming autumn stew that is rich, deeply savoury, and satisfying enough to eat on its own or as a side to roasted meats. Oyster mushrooms have a wonderful meaty texture that holds up beautifully in long cooking.',
                ingredients: [
                    '400g fresh oyster mushrooms, torn into large pieces',

                tip: 'Fresh oyster mushrooms are at their best within a day or two of picking. Older mushrooms become soft and lose their flavour. Look for firm clusters with tight, unfurled edges.',

            },
            'pickled-garlic-mustard': {

                season: [false,false,true,true,true,false,false,false,false,false,false,false],
                desc: 'A sharp, garlicky condiment that punches well above its weight. Use it anywhere you would use capers or a peppery relish — on smørrebrød, with smoked fish, alongside grilled vegetables, or stirred into dressings.',

                seeAlso: []
            },
            'rosehip-syrup': {
                name: 'Rosehip Syrup',
                type: 'Drink',
                peak: 'sep',
                plantId: 'sea-buckthorn',
                plantName: 'Rosehip',
                plantDanish: 'Hyben',
                season: [false,false,false,false,false,false,false,true,true,true,false,false],
                desc: 'Rich, vitamin-packed and deeply autumnal. Rosehips contain more vitamin C than almost any other wild plant. Dilute with water, pour over porridge, or use as a cordial. Pick after the first frost for the sweetest hips.',

                    { title: 'First cook', text: 'Place the chopped hips in a pan with 500ml of the water. Bring to the boil then simmer for 20 minutes until soft. Strain through a jelly bag or double layer of muslin and set aside the liquid.' },

                tip: 'The small hairs inside rosehips are an irritant — never eat raw hips without straining very carefully through a fine cloth. The double-straining method here removes them safely. Hips from the dog rose (Rosa canina) give the best flavour.',

                stores: '3 months sealed, 4 weeks in the fridge once opened',
                seeAlso: ['sea-buckthorn-sorbet']
            },
            'sorrel-salad': {

                plantName: 'Wood Sorrel',
                plantDanish: 'Skovsyre',
                season: [false,false,false,true,true,true,false,false,false,false,false,false],
                desc: 'A sharp, lemony explosion of freshness. Wood sorrel has a clean citrus-like acidity that dresses itself — it barely needs anything added. The tiny heart-shaped leaves look as beautiful as they taste. Perfect as a garnish or a simple side.',

                tip: 'Wood sorrel is not the same as common sorrel (Rumex acetosa) though both are edible. The wood sorrel has small three-lobed heart-shaped leaves and a finer, more delicate flavour. Do not eat in very large quantities as it contains oxalic acid.',
                makes: '2 servings as a side',
                stores: 'Best eaten immediately. Washed leaves keep unwilted in a damp cloth in the fridge for 1 day.',
                seeAlso: ['wild-garlic-pesto']
            },
            'birch-sap-syrup': {
                name: 'Birch Sap Syrup',
                type: 'Drink',
                peak: 'mar',
                plantId: 'wild-garlic',
                plantName: 'Birch',
                plantDanish: 'Birk',
                season: [false,false,true,false,false,false,false,false,false,false,false,false],
                desc: 'The very first sweet taste of spring. Birch sap flows for only a brief window in late March, before the leaves open. Fresh it tastes like faintly sweet water. Reduced slowly it becomes a delicate, slightly caramel syrup unlike anything else.',
                ingredients: [
                    '2 litres fresh birch sap',

                method: [
                    { title: 'Tap the tree', text: 'Choose a healthy birch at least 20cm diameter. Drill a small hole (8–10mm) at a slight upward angle, about 1 metre from the ground. Insert a clean food-grade tube and hang a collection vessel. The sap flows on warm days after cold nights. Never take more than 2–3 litres from one tree.' },

                    { title: 'Bottle', text: 'Pour the warm syrup into a sterilised bottle and seal. It will thicken slightly as it cools.' }

                tip: 'Always seal the tap hole after collection with a clean wooden peg or a plug of moss. The flow stops naturally when the leaves open, usually within 2–3 weeks. Never tap the same tree two years running — let it recover for at least a year.',

                stores: '6 months sealed, 4 weeks in the fridge once opened',

            'crab-apple-jelly': {
                name: 'Crab Apple Jelly',

                season: [false,false,false,false,false,false,false,false,true,true,false,false],

                    '500ml water',
                    'Sugar (measure after straining — see method)',
                    'Juice of 1 lemon'
                ],
                method: [

                    { title: 'Measure and cook', text: 'Measure the strained juice. Add 400g of sugar per 600ml of juice. Pour into a clean pan with the lemon juice. Bring to a rolling boil and cook hard for 10–15 minutes, testing for set on a cold plate — a small blob should wrinkle when pushed.' },

                ],
                tip: 'The colour of the finished jelly depends on the variety of crab apple. Some give a pale gold, others a deep red. Either way the flavour is excellent. A sprig of rosemary or a few juniper berries added during cooking make an interesting variation.',
                makes: 'Around 3–4 small jars',
                stores: '12 months sealed in a cool dark place, 4 weeks in the fridge once opened',
                seeAlso: ['rosehip-syrup', 'juniper-salt']

        function firstMonth(seasonArr) {
            const idx = seasonArr.findIndex(v => v);
            return idx >= 0 ? MONTH_KEYS[idx] : 'jan';
        }

        function makeDots(seasonArr) {
            return MONTH_KEYS.map((m, i) => {
                const color = seasonArr[i] ? hexMap[m] : 'white';
                return `<span class="dot" style="background-color:${color};"></span>`;
            }).join('');
        }

        function render() {
            const id = new URLSearchParams(window.location.search).get('id') || '';
            const recipe = recipeData[id];

            if (!recipe) {
                document.querySelector('main').innerHTML = '<p class="text-center text-gray-400 py-20">Recipe not found. <a href="recipes.html" class="underline">Back to Kitchen</a></p>';
                lucide.createIcons();
                return;
            }

            document.title = `FORAGER — ${recipe.name}`;

            // Hero
            const heroColor = hexMap[firstMonth(recipe.season)];
            const isDark = darkMonths.includes(firstMonth(recipe.season));
            const hero = document.getElementById('hero');
            hero.style.backgroundColor = heroColor;

            // Type badge
            const badge = document.getElementById('type-badge');
            badge.textContent = recipe.type;
            badge.style.backgroundColor = typeBadgeColors[recipe.type];
            badge.style.color = typeBadgeText[recipe.type];

            // Recipe name
            const nameEl = document.getElementById('recipe-name');
            nameEl.textContent = recipe.name;
            nameEl.style.color = isDark ? 'white' : '#1A1C19';

            // Plant link
            const plantLink = document.getElementById('plant-link');
            plantLink.textContent = recipe.plantName;
            plantLink.href = `plant-detail.html?id=${recipe.plantId}`;
            plantLink.style.color = '#2D6A4F';
            document.getElementById('plant-danish').textContent = `(${recipe.plantDanish})`;

            // Season dots
            document.getElementById('season-dots').innerHTML = makeDots(recipe.season);

            // Description
            document.getElementById('recipe-desc').textContent = recipe.desc;

            // Ingredients
            const ingList = document.getElementById('ingredients-list');
            recipe.ingredients.forEach(ing => {
                const li = document.createElement('li');
                li.className = 'flex items-start gap-3 text-sm text-gray-700';
                li.innerHTML = `
                    <span class="mt-1.5 w-2 h-2 rounded-full flex-shrink-0" style="background-color:${hexMap[firstMonth(recipe.season)]}"></span>
                    <span>${ing}</span>
                `;
                ingList.appendChild(li);
            });

            // Method steps
            const methodEl = document.getElementById('method-steps');
            recipe.method.forEach((step, i) => {
                const div = document.createElement('div');
                div.className = 'flex gap-4';
                div.innerHTML = `
                    <div class="step-number" style="background-color:${hexMap[firstMonth(recipe.season)]};color:${isDark ? 'white' : '#1A1C19'}">${i + 1}</div>
                    <div class="flex-1 pt-0.5">
                        <p class="font-semibold text-sm mb-1">${step.title}</p>
                        <p class="text-sm text-gray-600 leading-relaxed">${step.text}</p>
                    </div>
                `;
                methodEl.appendChild(div);
            });

            // Foraging tip
            if (recipe.tip) {
                document.getElementById('tip-text').textContent = recipe.tip;
                document.getElementById('tip-section').classList.remove('hidden');
            }

            // Makes / stores
            if (recipe.makes || recipe.stores) {
                document.getElementById('makes-section').classList.remove('hidden');
                if (recipe.makes) {
                    document.getElementById('makes-text').textContent = recipe.makes;
                    document.getElementById('makes-block').classList.remove('hidden');
                }
                if (recipe.stores) {
                    document.getElementById('stores-text').textContent = recipe.stores;
                    document.getElementById('stores-block').classList.remove('hidden');
                }
            }

            // See also
            const relatedRecipes = recipe.seeAlso || [];
            if (relatedRecipes.length > 0) {
                document.getElementById('seealso-section').classList.remove('hidden');
                const seealsoLinks = document.getElementById('seealso-links');
                relatedRecipes.forEach(rId => {
                    const r = recipeData[rId];
                    if (!r) return;
                    const link = document.createElement('a');
                    link.href = `recipe-detail.html?id=${rId}`;
                    link.className = 'flex items-center justify-between bg-white border border-gray-100 card-shadow rounded-xl p-4 hover:shadow-md transition-shadow';
                    link.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background-color:${hexMap[firstMonth(r.season)]}">
                                <i data-lucide="flame" class="w-4 h-4 ${darkMonths.includes(firstMonth(r.season)) ? 'text-white' : 'text-gray-700'} opacity-80"></i>
                            </div>
                            <span class="font-semibold text-sm">${r.name}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded-full" style="background-color:${typeBadgeColors[r.type]};color:${typeBadgeText[r.type]}">${r.type}</span>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300"></i>
                        </div>
                    `;
                    seealsoLinks.appendChild(link);
                });
            }

            // Header month dot
            document.getElementById('month-dot').style.backgroundColor = hexMap[MONTH_KEYS[new Date().getMonth()]];

            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
