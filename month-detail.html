        function makeDots(seasonArr) {
            const colors = Object.values(COLORS);
            return '<div class="flex gap-1 flex-wrap my-2">' +
                seasonArr.map((active, i) =>
                    `<span class="dot" style="background:${active ? colors[i] : '#E5E7EB'};"></span>`
                ).join('') +
            '</div>';
        }

        function getParam() {
            const params = new URLSearchParams(window.location.search);
            return params.get('m') || 'mar';
        }

        function render() {
            const key = getParam();
            const idx = MONTH_KEYS.indexOf(key);
            const data = monthData[key] || monthData['mar'];

            // Header
            document.getElementById('header-band').style.backgroundColor = data.color;
            document.getElementById('month-name').textContent = data.name;
            document.getElementById('mood-line').textContent = data.mood;

            // Prev / Next
            const prevIdx = (idx - 1 + 12) % 12;
            const nextIdx = (idx + 1) % 12;
            const prevKey = MONTH_KEYS[prevIdx];
            const nextKey = MONTH_KEYS[nextIdx];
            const prevData = monthData[prevKey];
            const nextData = monthData[nextKey];

            document.getElementById('prev-label').textContent = prevData.name;
            document.getElementById('prev-label').style.color = prevData.color;
            document.getElementById('prev-link').href = `month-detail.html?m=${prevKey}`;

            document.getElementById('next-label').textContent = nextData.name;
            document.getElementById('next-label').style.color = nextData.color;
            document.getElementById('next-link').href = `month-detail.html?m=${nextKey}`;

            // Plants
            const plantList = document.getElementById('plant-list');
            plantList.innerHTML = '';
            data.plants.forEach(p => {
                const card = document.createElement('a');
                card.href = `plant-detail.html?id=${p.name.toLowerCase().replace(/'/g, '').replace(/\s+/g,'-')}`;
                card.className = 'bg-white p-5 rounded-2xl shadow-sm border border-gray-50 block hover:shadow-md transition-shadow';
                card.innerHTML = `
                    <h3 class="text-lg font-bold">${p.name}</h3>
                    <p class="text-sm text-gray-400 italic mb-1">(${p.danish})</p>
                    ${makeDots(p.season)}
                    <p class="text-sm mt-1"><strong>Tip:</strong> ${p.tip}</p>
                    <p class="text-sm text-gray-500"><strong>Habitat:</strong> ${p.habitat}</p>
                `;
                plantList.appendChild(card);
            });

            // Field notes
            const notesList = document.getElementById('field-notes');
            notesList.innerHTML = '';
            data.notes.forEach(n => {
                const li = document.createElement('li');
                li.textContent = n;
                notesList.appendChild(li);
            });

            // Recipes
            const recipeList = document.getElementById('recipe-list');
            recipeList.innerHTML = '';
            data.recipes.forEach(r => {
                const card = document.createElement('a');
                card.href = `recipe-detail.html?id=${r.name.toLowerCase().replace(/'/g,'').replace(/\s+/g,'-')}`;
                card.className = 'bg-white rounded-2xl shadow-sm border border-gray-50 block hover:shadow-md transition-shadow overflow-hidden flex';
                card.innerHTML = `
                    <div class="w-1.5 flex-shrink-0 rounded-l-2xl" style="background-color:${data.color}"></div>
                    <div class="p-5 flex-1">
                        <h3 class="text-lg font-bold">${r.name}</h3>
                        <p class="text-xs font-bold tracking-widest mt-1 mb-2 text-gray-400 uppercase">${r.ingredient}</p>
                        <p class="text-sm text-gray-500">${r.desc}</p>
                    </div>
                `;
                recipeList.appendChild(card);
            });

            // Preserve
            document.getElementById('preserve-note').textContent = data.preserve;

            // Page title
            document.title = `FORAGER — ${data.name}`;
        }

        render();
        lucide.createIcons();
    </script>
</body>
</html>
