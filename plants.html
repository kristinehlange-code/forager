        let activeFilter = null;

        function firstMonth(seasonArr) {
            const idx = seasonArr.findIndex(v => v);
            return idx >= 0 ? MONTH_KEYS[idx] : 'jan';
        }

        function makeDots(seasonArr) {
            return MONTH_KEYS.map((m, i) => {
                const color = seasonArr[i] ? hexMap[m] : 'white';
                return `<span class="dot" style="background-color:${color};"></span>`;
            }).join('');
        }

        function setFilter(monthIdx) {
            activeFilter = monthIdx;
            // Update ALL button style
            const allBtn = document.getElementById('btn-all');
            allBtn.className = monthIdx === null
                ? 'px-3 py-1 bg-gray-900 text-white rounded-full text-xs font-bold transition-colors'
                : 'px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-xs font-bold hover:bg-gray-200 transition-colors';
            // Update filter dot active states
            document.querySelectorAll('.filter-dot').forEach((btn, i) => {
                btn.classList.toggle('active', i === monthIdx);
            });
            renderGrid();
        }

        function renderGrid() {
            const query = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('plant-grid');
            const noResults = document.getElementById('no-results');
            grid.innerHTML = '';

            const filtered = plants.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(query) || p.dk.toLowerCase().includes(query);
                const matchesMonth = activeFilter === null || p.season[activeFilter];
                return matchesSearch && matchesMonth;
            });

            if (filtered.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                filtered.forEach(p => {
                    const card = document.createElement('a');
                    card.href = `plant-detail.html?id=${p.id}`;
                    card.className = 'bg-white rounded-2xl border border-gray-100 card-shadow block hover:shadow-md transition-shadow overflow-hidden';
                    card.innerHTML = `
                        <div class="h-36 flex items-center justify-center rounded-t-2xl" style="background-color:${hexMap[firstMonth(p.season)]}">
                            <i data-lucide="leaf" class="w-8 h-8 text-white opacity-80"></i>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-lg leading-tight">${p.name} <span class="text-gray-400 font-normal text-base">(${p.dk})</span></h3>
                            <div class="flex gap-1 py-2">${makeDots(p.season)}</div>
                            <p class="text-xs font-bold text-green-700 uppercase tracking-wide mb-2">${p.habitat}</p>
                            <p class="text-sm text-gray-600 mb-1">${p.tip}</p>
                            ${p.warning && p.warning !== 'null' ? `<div class="mt-2 text-xs font-semibold text-amber-700">⚠ Lookalike risk</div>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
            lucide.createIcons();
        }

        // Build month filter dots
        const filterContainer = document.getElementById('month-filters');
        MONTH_KEYS.forEach((m, i) => {
            const btn = document.createElement('button');
            btn.className = 'filter-dot';
            btn.style.backgroundColor = hexMap[m];
            btn.title = MONTH_NAMES[i];
            btn.onclick = () => setFilter(i);
            filterContainer.appendChild(btn);
        });

        // Search listener
        document.getElementById('search').addEventListener('input', renderGrid);

        // Set header month dot
        document.getElementById('month-dot').style.backgroundColor = hexMap[MONTH_KEYS[new Date().getMonth()]];

        // Initial render
        renderGrid();
    </script>
