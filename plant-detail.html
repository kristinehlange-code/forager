<body class="pb-24">

    <header class="sticky top-0 bg-[#FDFCFB]/90 backdrop-blur-md z-50 p-4 flex justify-between items-center border-b border-gray-100">
        <a href="plants.html" class="flex items-center gap-2 text-gray-500 hover:text-gray-900">

        </div>

        <!-- How to spot it -->
        <section class="mb-7">
            <h2 class="text-lg font-bold mb-2">How to spot it</h2>
            <ul id="spot-list" class="space-y-2 text-sm text-gray-600 list-disc pl-5"></ul>
        </section>

        <!-- Where to find it -->
        <section class="mb-7">
            <h2 class="text-lg font-bold mb-2">Where to find it</h2>
            <p id="habitat-text" class="text-sm text-gray-600 leading-relaxed"></p>
        </section>

        <!-- Watch out for -->

            <h2 class="text-lg font-bold mb-2">Watch out for</h2>
            <div class="warning-band">
                <p id="warning-text" class="text-sm text-amber-900 leading-relaxed"></p>

        <!-- About this plant -->

            <h2 class="text-lg font-bold mb-2">About this plant</h2>

            <div id="recipe-links" class="space-y-2"></div>

            <h2 class="text-lg font-bold mb-3">Your log entries</h2>
            <div id="log-entries" class="space-y-3"></div>
            <div id="log-empty" class="hidden bg-gray-50 rounded-xl p-4 text-center">

                <a href="log.html" class="text-sm font-semibold text-gray-600 underline underline-offset-2 mt-1 block">Add your first entry</a>

    </main>

                    'Strong, complex herbal scent — slightly camphorous and medicinal.'
                ],
                habitat: 'Found on dry grassland, meadows, roadsides, and field edges throughout Denmark. Extremely common and flowers from June through September. One of the most widespread wild plants in the country.',
                warning: 'Can cause skin irritation in sensitive individuals. Avoid during pregnancy. No dangerous lookalikes when the feathery leaves and distinctive scent are confirmed.',
                about: 'Yarrow is one of the oldest medicinal plants known, used for at least 60,000 years based on archaeological evidence. It has a long history of use in Scandinavian folk medicine and brewing. In cooking it is used sparingly as an aromatic herb — its flavour is complex and slightly bitter, working well in small quantities as a flavouring rather than a main ingredient.',
                uses: [
                    'Use a few leaves as an aromatic herb in stocks, soups, and stews.',
                    'Add to home-brewed beer or fermented drinks as a bittering agent.',
                    'Dry flowers and leaves for a medicinal tea traditionally used for colds and fevers.',
                    'Infuse in oil or vinegar for a complex herbal condiment.',
                    'Use as a garnish — the flat flower heads are beautiful on a plate.'
                ],
                recipes: []
            },
            'white-dead-nettle': {
                name: 'White Dead-nettle', danish: 'Hvid Døvnælde', peak: 'jan',
                season: [true,true,true,false,false,false,false,false,false,false,false,true],
                spot: [
                    'Leaves look very similar to stinging nettle but with no sting whatsoever.',
                    'Distinctive white hooded flowers in whorls around the stem.',
                    'Square stem, typical of the mint family.',
                    'Leaves are softly hairy and have a mild, slightly unpleasant smell when crushed.'
                ],
                habitat: 'Found on roadsides, hedgerows, urban edges, and disturbed ground throughout Denmark. Flowers almost year-round in mild weather, making it one of the few plants available in winter.',
                warning: 'No dangerous lookalikes — it closely resembles stinging nettle but the absence of any sting and the presence of white flowers make it easy to distinguish. Touch the leaves to confirm there is no sting.',
                about: 'White Dead-nettle is a reliable winter green, one of the few wild plants available in the lean months of January and February. The flowers are sweet and can be sucked for nectar. The leaves are nutritious and mild-flavoured. It has been used as a pot herb across northern Europe for centuries and deserves to be better known.',
                uses: [
                    'Use leaves as a pot herb — cook like spinach in soups, stews, and stir-fries.',
                    'Add flowers to salads as a sweet, mild garnish.',
                    'Dry leaves for a mild, grassy tea.',
                    'Use young shoots in spring rolls or fritters.',
                    'Blend into green smoothies for a nutritional boost in winter.'
                ],
                recipes: []
            },
            'shepherd\'s-purse': {
                name: "Shepherd's Purse", danish: 'Hyrdetaske', peak: 'mar',
                season: [true,true,true,true,false,false,false,false,false,false,true,true],
                spot: [
                    'Small heart-shaped or triangular seed pods that look like old-fashioned purses — the key identifying feature.',
                    'Basal rosette of deeply lobed leaves similar to dandelion.',
                    'Tiny white four-petalled flowers at the top of branching stems.',
                    'Mild peppery smell when leaves are crushed.'
                ],
                habitat: 'Found on disturbed ground, arable fields, roadsides, and gardens throughout Denmark. One of the most common and widespread weeds in the country. Available almost year-round in mild climates.',
                warning: 'No dangerous lookalikes — the distinctive heart-shaped seed pods make it unmistakable. Avoid picking from sprayed agricultural land.',
                about: "Shepherd's Purse is one of the most overlooked and underrated edible plants in Denmark. Available almost year-round, it is a reliable source of fresh greens in winter and early spring. The flavour is mild and peppery, similar to watercress, and the whole plant is edible including the seed pods which have a mustard-like bite.",
                uses: [
                    'Use young leaves in salads for a mild peppery flavour.',
                    'Add to stir-fries and soups as a nutritious green.',
                    'Use green seed pods as a peppery condiment — they taste of mustard and capers.',
                    'Dry seeds and grind as a mustard-like spice.',
                    'Blend into green sauces and pestos for a watercress-like flavour.'
                ],
                recipes: []
            }
        };

        // Recipe data for linking
        const recipeData = {
            'wild-garlic-pesto': { name: 'Wild Garlic Pesto', type: 'Preserve' },
            'nettle-soup': { name: 'Nettle Soup', type: 'Fresh' },
            'nettle-tea': { name: 'Nettle Tea', type: 'Drink' },
            'elderflower-cordial': { name: 'Elderflower Cordial', type: 'Drink' },
            'chanterelle-butter': { name: 'Chanterelle Butter', type: 'Preserve' },
            'dandelion-honey': { name: 'Dandelion Honey', type: 'Preserve' },
            'sea-buckthorn-sorbet': { name: 'Sea Buckthorn Sorbet', type: 'Fresh' },
            'meadowsweet-tea': { name: 'Meadowsweet Tea', type: 'Drink' },
            'juniper-salt': { name: 'Juniper Salt', type: 'Preserve' },
            'oyster-mushroom-stew': { name: 'Oyster Mushroom Stew', type: 'Fresh' },
            'pickled-garlic-mustard': { name: 'Pickled Garlic Mustard', type: 'Preserve' }
        };

        const typeBadgeColors = { Fresh: '#DDF0E4', Preserve: '#F8F8D0', Drink: '#D8EBF8' };
        const typeBadgeText = { Fresh: '#3A5C3A', Preserve: '#6B6B00', Drink: '#1A4A6B' };

        function makeDots(seasonArr, peakKey) {
            return MONTH_KEYS.map((m, i) => {
                const color = seasonArr[i] ? hexMap[m] : 'white';
                return `<span class="dot" style="background-color:${color};"></span>`;
            }).join('');
        }

        function getParam() {
            return new URLSearchParams(window.location.search).get('id') || '';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function render() {
            const id = getParam();
            const plant = plantData[id];

            if (!plant) {
                document.querySelector('main').innerHTML = '<p class="text-center text-gray-400 py-20">Plant not found.</p>';
                lucide.createIcons();
                return;
            }

            // Page title
            document.title = `FORAGER — ${plant.name}`;

            // Hero
            const hero = document.getElementById('hero');
            hero.style.backgroundColor = hexMap[plant.peak];

            // Name
            document.getElementById('plant-name').textContent = plant.name;
            document.getElementById('plant-danish').textContent = `(${plant.danish})`;

            // Season dots
            document.getElementById('season-dots').innerHTML = makeDots(plant.season, plant.peak);

            // How to spot it
            const spotList = document.getElementById('spot-list');
            plant.spot.forEach(s => {
                const li = document.createElement('li');
                li.textContent = s;
                spotList.appendChild(li);
            });

            // Habitat
            document.getElementById('habitat-text').textContent = plant.habitat;

            // Warning
            if (plant.warning) {
                document.getElementById('warning-text').textContent = plant.warning;
                document.getElementById('warning-section').classList.remove('hidden');
            }

            // About
            document.getElementById('about-text').textContent = plant.about;

            // Uses
            const usesList = document.getElementById('uses-list');
            plant.uses.forEach(u => {
                const li = document.createElement('li');
                li.textContent = u;
                usesList.appendChild(li);
            });

            // Recipe links
            if (plant.recipes && plant.recipes.length > 0) {
                const recipeSection = document.getElementById('recipes-section');
                const recipeLinks = document.getElementById('recipe-links');
                recipeSection.classList.remove('hidden');
                plant.recipes.forEach(rId => {
                    const r = recipeData[rId];
                    if (!r) return;
                    const link = document.createElement('a');
                    link.href = `recipe-detail.html?id=${rId}`;
                    link.className = 'flex items-center justify-between bg-white border border-gray-100 card-shadow rounded-xl p-4 hover:shadow-md transition-shadow';
                    link.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background-color:${hexMap[plant.peak]}">
                                <i data-lucide="flame" class="w-4 h-4 text-white opacity-80"></i>
                            </div>
                            <span class="font-semibold text-sm">${r.name}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded-full" style="background-color:${typeBadgeColors[r.type]};color:${typeBadgeText[r.type]}">${r.type}</span>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300"></i>
                        </div>
                    `;
                    recipeLinks.appendChild(link);
                });
            }

            // Log entries — filter by plant name or danish name
            const logEntries = JSON.parse(localStorage.getItem('forager-log') || '[]');
            const searchTerms = [plant.name.toLowerCase(), plant.danish.toLowerCase()];
            const matching = logEntries.filter(e => {
                const found = (e.found || '').toLowerCase();
                const notes = (e.notes || '').toLowerCase();
                return searchTerms.some(t => found.includes(t) || notes.includes(t));
            }).sort((a, b) => b.date.localeCompare(a.date));

            const logContainer = document.getElementById('log-entries');
            const logEmpty = document.getElementById('log-empty');

            if (matching.length === 0) {
                logEmpty.classList.remove('hidden');
            } else {
                matching.forEach(entry => {
                    const hasCoords = entry.lat && entry.lng;
                    const mapsUrl = hasCoords ? `https://www.google.com/maps?q=${entry.lat},${entry.lng}` : null;
                    const card = document.createElement('div');
                    card.className = 'bg-white border border-gray-100 card-shadow rounded-xl overflow-hidden';
                    card.innerHTML = `
                        ${entry.photo ? `<img src="${entry.photo}" alt="Log photo" class="w-full object-cover max-h-40">` : ''}
                        <div class="p-4">
                            <div class="flex items-start justify-between gap-2">
                                <p class="font-semibold text-sm">${formatDate(entry.date)}</p>
                                <a href="log.html" class="text-[10px] text-gray-400 underline underline-offset-2 whitespace-nowrap">Open log</a>
                            </div>
                            ${entry.location ? `
                            <p class="text-xs text-gray-400 flex items-center gap-1 mt-1">
                                ${mapsUrl
                                    ? `<a href="${mapsUrl}" target="_blank" rel="noopener" class="flex items-center gap-1 hover:text-green-700">
                                           <i data-lucide="map-pin" class="w-3 h-3"></i><span class="underline underline-offset-2">${entry.location}</span>
                                       </a>`
                                    : `<i data-lucide="map-pin" class="w-3 h-3"></i>${entry.location}`}
                            </p>` : ''}
                            ${entry.notes ? `<p class="text-sm text-gray-600 mt-2 leading-relaxed">${entry.notes}</p>` : ''}
                        </div>
                    `;
                    logContainer.appendChild(card);
                });
            }

            // Header month dot
            document.getElementById('month-dot').style.backgroundColor = hexMap[MONTH_KEYS[new Date().getMonth()]];

            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
